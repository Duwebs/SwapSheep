<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapsheep Dashboard</title>
    <style>
        :root {
            --bg-color: #F5F2EB;
            --text-main: #2A2A2A;
            --accent-rust: #D35436;
            --line-color: #1A1A1A;
            --card-bg: rgba(255, 255, 255, 0.5);
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative;
            overflow-x: hidden; /* Taaki sheep ki wajah se horizontal scrollbar na aaye */
        }
        
        .app-container { 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            z-index: 2; /* Content sheep ke upar dikhega */
        }

        /* --- Top Icons Styles --- */
        .top-media-icons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px; /* Logo aur icons ke beech ka gap */
            padding: 0 10px;
        }

        .top-icon-img {
            width: 85px; /* Visual balance ke liye size thoda bada (15-20%) kiya hai */
            height: auto;
            object-fit: contain;
            cursor: pointer;
            /* Smooth transitions aur halka sa bouncy effect animation ke liye */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* --- New: Har icon ko alag natural paper-cut tilt diya hai --- */
        .top-media-icons img:nth-child(1) {
            transform: rotate(-3deg); /* Image icon left tilt */
        }
        
        .top-media-icons img:nth-child(2) {
            transform: rotate(2.5deg); /* Video icon right tilt */
        }
        
        .top-media-icons img:nth-child(3) {
            transform: rotate(-1.5deg); /* Audio icon halka left tilt */
        }

        /* --- New: Hover ya Click (Active) karne par ekdum seedha aur bada ho jaye --- */
        .top-media-icons img:hover,
        .top-media-icons img:active {
            transform: rotate(0deg) scale(1.12); /* Seedha hokar halka sa pop-out hoga */
        }
        
        /* --- Logo Styles --- */
        .logo-wrapper { 
            width: 25vw;
            max-width: 95px; 
            min-width: 80px;
            aspect-ratio: 1 / 1;
            margin: 0 auto 15px auto; 
        }

        .sheep-logo { width: 100%; height: 100%; }
        .rust-sun { fill: var(--accent-rust); }
        .sheep-lines, .arrow-path, .arrow-head { stroke: var(--line-color); stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .sheep-lines { stroke-width: 3.5; }
        .arrow-path, .arrow-head { stroke-width: 2.5; }

        .rotating-loop {
            transform-origin: 100px 100px;
            animation: spinLoop 12s linear infinite;
        }

        @keyframes spinLoop {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-title { 
            font-size: 2.2rem; 
            font-weight: 300; 
            letter-spacing: 3px; 
            margin-bottom: 20px; 
        }
        
        /* Text/Code Box */
        .text-input-box {
            width: 100%; 
            height: 120px; 
            background: var(--card-bg);
            border: 1.5px solid var(--line-color); 
            border-radius: 4px; 
            padding: 12px;
            margin-bottom: 25px; 
            box-shadow: 3px 3px 0px var(--line-color);
            resize: none;
            outline: none;
        }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        
        .nav-card {
            background: var(--card-bg);
            border: 1.5px solid var(--line-color);
            border-radius: 4px;
            padding: 20px 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            box-shadow: 2px 2px 0px var(--line-color);
        }
        
        .nav-card:hover { 
            background: var(--accent-rust); 
            color: #fff; 
            transform: translateY(-2px); 
        }

        /* --- Bottom Corner Sheep Styles (Bilkul safe hai!) --- */
        .bottom-mascot {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 120px; 
            height: auto;
            z-index: 1; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Uper waale teeno image, video aur audio icons yahan hain -->
        <div class="top-media-icons">
            <img src="/assets/image.svg" alt="Image Icon" class="top-icon-img">
            <img src="/assets/video.svg" alt="Video Icon" class="top-icon-img">
            <img src="/assets/audio.svg" alt="Audio Icon" class="top-icon-img">
        </div>

        <!-- 2. Top Rotating Logo -->
        <div class="logo-wrapper">
            <svg class="sheep-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <g class="rotating-loop">
                    <path class="arrow-path" d="M 100,25 A 75,75 0 0,1 170,120" />
                    <path class="arrow-path" d="M 100,175 A 75,75 0 0,1 30,80" />
                    <path class="arrow-head" d="M 165,105 L 170,120 L 155,123" />
                    <path class="arrow-head" d="M 35,95 L 30,80 L 45,77" />
                </g>
                <circle cx="100" cy="100" r="45" class="rust-sun" />
                <path class="sheep-lines" d="M 80,90 C 80,75 120,75 120,90 C 120,105 95,105 95,115" />
                <path class="sheep-lines" d="M 95,115 L 110,125 L 120,115" />
            </svg>
        </div>

        <!-- 3. Brand Title -->
        <h1 class="brand-title">swapsheep</h1>
        
        <!-- 4. Text/Code Box -->
        <textarea class="text-input-box" placeholder="Paste your code or text here..."></textarea>

        <!-- 5. Navigation Hub -->
        <div class="nav-grid">
            <a href="image.html" class="nav-card">IMAGE</a>
            <a href="video.html" class="nav-card">VIDEO</a>
            <a href="audio.html" class="nav-card">AUDIO</a>
        </div>
    </div>

    <!-- Neeche kone me jhankti hui sheep (Bilkul touch nahi kiya ise) -->
    <img src="/assets/sheep.svg" alt="Peeking Sheep" class="bottom-mascot">

</body>
</html>
