<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapsheep - Video Upload</title>
    <style>
        :root {
            --bg-color: #F5F2EB;     
            --text-main: #2A2A2A;    
            --accent-rust: #D35436;  
            --line-color: #1A1A1A;   
            --card-bg: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 0), radial-gradient(rgba(0,0,0,0.02) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
        }

        .box {
            width: 100%;
            max-width: 360px;
            padding: 40px 24px;
            border: 1.5px solid var(--line-color);
            background: var(--card-bg);
            text-align: center;
            border-radius: 4px;
            box-shadow: 4px 4px 0px var(--line-color);
        }

        h2 { font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 25px; }

        .btn-upload {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--line-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .btn-upload:hover { background: var(--accent-rust); }
        
        .file-info { margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; color: var(--accent-rust); }
        .back-link { color: var(--text-muted); text-decoration: underline; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="box">
        <h2>VIDEO UPLOAD</h2>
        
        <!-- accept="video/*" strictly restricts to video formats -->
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        
        <div class="file-info" id="fileInfo">No video selected</div>
        
        <button class="btn-upload" onclick="document.getElementById('videoInput').click()">Select Video</button>
        
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const fileInfo = document.getElementById('fileInfo');

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileInfo.innerText = `🎥 ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            }
        });
    </script>
</body>
</html>
