<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Swap - Swapsheep</title>
    <!-- QR Scanner Library via CDN -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #F5F2EB;
            --text-main: #2A2A2A;
            --accent-rust: #D35436;
            --line-color: #1A1A1A;
            --card-bg: rgba(255, 255, 255, 0.5);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            position: relative;
            overflow-x: hidden; 
        }
        
        .app-container { width: 100%; max-width: 400px; text-align: center; z-index: 2; }

        .brand-title { font-size: 2.2rem; font-weight: 300; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-title { font-size: 1rem; color: #666; margin-bottom: 20px; }

        /* Camera Scanner Box */
        #scanner-container {
            width: 100%;
            background: #fff;
            border: 1.5px solid var(--line-color);
            border-radius: 4px;
            box-shadow: 3px 3px 0px var(--line-color);
            padding: 10px;
            margin-bottom: 20px;
        }

        #camera-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            overflow: hidden;
            background: #000;
        }

        .receive-zone {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 20px;
        }

        .pin-input {
            width: 100%; 
            padding: 14px;
            background: var(--card-bg);
            border: 1.5px solid var(--line-color);
            border-radius: 4px;
            font-weight: 700;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 3px;
            outline: none;
            box-shadow: 3px 3px 0px var(--line-color);
        }

        .action-btn {
            width: 100%; 
            padding: 14px;
            background: var(--accent-rust);
            color: white;
            border: 1.5px solid var(--line-color);
            border-radius: 4px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--line-color);
            transition: all 0.1s;
        }

        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--line-color);
        }

        /* Result Box */
        .result-box {
            display: none;
            width: 100%;
            height: 140px;
            background: #fff;
            border: 1.5px solid var(--line-color);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 25px;
            box-shadow: 3px 3px 0px var(--line-color);
            text-align: left;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 25px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        .bottom-mascot {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 120px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1 class="brand-title">swapsheep</h1>
        <p class="sub-title">Align QR code or enter PIN below</p>

        <!-- 1. Scanner Preview on Top -->
        <div id="scanner-container">
            <div id="camera-preview"></div>
        </div>

        <!-- 2. Input Section with Button Below -->
        <div class="receive-zone">
            <input type="text" id="pin-input" class="pin-input" placeholder="ENTER PIN" maxlength="6">
            <button id="get-btn" class="action-btn">GET TEXT</button>
        </div>

        <!-- Result Content Box -->
        <div id="result-box" class="result-box"></div>

        <a href="dashboard.html" class="back-link">← Go Back to Send Text</a>
    </div>

    <!-- Bottom Mascot -->
    <img src="/assets/sheep.svg" alt="Peeking Sheep" class="bottom-mascot">

    <!-- Firebase SDK Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configurations matching dashboard.html
        const firebaseConfig = {
            apiKey: "AIzaSyCyFPcQ6X0bTS97DhL-SEJ_2ebvvy1SozU",
            authDomain: "swapsheep-61cfc.firebaseapp.com",
            projectId: "swapsheep-61cfc",
            storageBucket: "swapsheep-61cfc.firebasestorage.app",
            messagingSenderId: "620397250043",
            appId: "1:620397250043:web:26111357ada1c3958cf75e",
            measurementId: "G-GF9N6MDCCN"
        };

        // Initialize Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const getBtn = document.getElementById('get-btn');
        const pinInput = document.getElementById('pin-input');
        const resultBox = document.getElementById('result-box');
        let html5QrCode = null;

        // Fetch Data from Firestore Function
        async function fetchSwapData(code) {
            if(!code) {
                alert("Pehle code daalo ya QR scan karo!");
                return;
            }

            resultBox.style.display = 'block';
            resultBox.style.color = 'var(--text-main)';
            resultBox.innerText = "🐑 Connecting to database...";

            try {
                const docRef = doc(db, "swaps", code);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    // Displaying text context
                    resultBox.innerText = data.content;
                } else {
                    resultBox.style.color = 'var(--accent-rust)';
                    resultBox.innerText = "❌ Code galat hai ya data expire ho chuka hai, bhai!";
                }
            } catch (error) {
                console.error("Fetch operational failure: ", error);
                resultBox.style.color = 'var(--accent-rust)';
                resultBox.innerText = "❌ Connection failed. Check network or security rules.";
            }
        }

        // Action button click handler
        getBtn.addEventListener('click', () => {
            const code = pinInput.value.trim();
            fetchSwapData(code);
        });

        // Automatically start camera when page loads
        window.addEventListener('DOMContentLoaded', () => {
            html5QrCode = new Html5Qrcode("camera-preview");
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 220, height: 220 } },
                (decodedText) => {
                    pinInput.value = decodedText;
                    // Stop camera streaming post-detection
                    html5QrCode.stop().catch(err => console.log(err));
                    // Auto hit database fetch logic
                    fetchSwapData(decodedText);
                },
                (err) => {}
            ).catch((err) => {
                console.error("Camera auto-start failed:", err);
                document.getElementById('camera-preview').innerHTML = "<div style='color:#666; padding:45px 15px; font-size:0.9rem;'>Camera block hai bhai.<br>Neeche PIN daal kar kaam chalao! 🐑</div>";
            });
        });
    </script>
</body>
</html>
