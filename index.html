<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapsheep</title>
    <style>
        :root { 
            --bg-color: #F5F2EB; 
            --line-color: #1A1A1A; 
            --accent-rust: #D35436; 
            --text-muted: #7A756B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            background: var(--bg-color); 
            min-height: 100vh; 
            min-height: -webkit-fill-available;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            padding: 30px 20px;
            overflow-x: hidden;

            /* Raw paper texture grid */
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 0), 
                              radial-gradient(rgba(0,0,0,0.02) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
        }

        /* Central stack container */
        .splash-card {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Top Minimalist Animated Logo */
        .logo-wrapper { 
            width: 30vw;
            max-width: 110px; 
            min-width: 85px;
            aspect-ratio: 1 / 1;
            margin-bottom: 20px; 
        }

        .sheep-logo { width: 100%; height: 100%; }
        .rust-sun { fill: var(--accent-rust); }
        .sheep-lines, .arrow-path, .arrow-head { stroke: var(--line-color); stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .sheep-lines { stroke-width: 3.5; }
        .arrow-path, .arrow-head { stroke-width: 2.5; }

        .rotating-loop {
            transform-origin: 100px 100px;
            animation: spinLoop 12s linear infinite;
        }

        @keyframes spinLoop {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-title {
            font-size: clamp(2.2rem, 8vw, 2.8rem);
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--line-color);
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* --- Clickable Sitting Sheep Layer --- */
        .mid-sheep-wrapper {
            width: 65vw;
            max-width: 250px;
            margin-bottom: -38px; 
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 15; 
            cursor: pointer; /* Pointer cursor dikhane ke liye */
            -webkit-tap-highlight-color: transparent; /* Mobile click highlight remove karne ke liye */
        }

        .mid-sheep-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Smooth pop-up transition */
        }

        /* Hover karne par sheep halki si badi hogi (looks interactive) */
        .mid-sheep-wrapper:hover img {
            transform: scale(1.05); 
        }

        /* Click karte waqt thoda scale down */
        .mid-sheep-wrapper:active img {
            transform: scale(0.98);
        }

        /* --- Action Button --- */
        .btn-start { 
            width: 85%;
            max-width: 280px;
            background: var(--line-color); 
            color: white; 
            padding: 16px 32px; 
            border: 1.5px solid var(--line-color); 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 4px; 
            box-shadow: 4px 4px 0px var(--accent-rust); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 10; 
        }

        .btn-start:hover { 
            transform: translate(-2px, -2px); 
            box-shadow: 6px 6px 0px var(--accent-rust); 
        }
        
        .btn-start:active { 
            transform: translate(2px, 2px); 
            box-shadow: 1px 1px 0px var(--accent-rust); 
        }
    </style>
</head>
<body>

    <div class="splash-card">
        <!-- 1. Top Rotating Logo -->
        <div class="logo-wrapper">
            <svg class="sheep-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <g class="rotating-loop">
                    <path class="arrow-path" d="M 100,25 A 75,75 0 0,1 170,120" />
                    <path class="arrow-path" d="M 100,175 A 75,75 0 0,1 30,80" />
                    <path class="arrow-head" d="M 165,105 L 170,120 L 155,123" />
                    <path class="arrow-head" d="M 35,95 L 30,80 L 45,77" />
                </g>
                <circle cx="100" cy="100" r="45" class="rust-sun" />
                <path class="sheep-lines" d="M 80,90 C 80,75 120,75 120,90 C 120,105 95,105 95,115" />
                <path class="sheep-lines" d="M 95,115 L 110,125 L 120,115" />
            </svg>
        </div>

        <!-- 2. Brand Identity -->
        <h1 class="brand-title">swapsheep</h1>
        <p class="brand-subtitle">effortless, clean file swapping</p>
        
        <!-- 3. Clickable Sitting Sheep -->
        <div class="mid-sheep-wrapper" onclick="location.href='dashboard.html'">
            <img src="/assets/swapsheep.svg" alt="Cute Swapsheep Graphic">
        </div>

        <!-- 4. Main Trigger Button -->
        <button class="btn-start" onclick="location.href='dashboard.html'">GET STARTED</button>
    </div>

</body>
</html>
