<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Swapsheep</title>
    <style>
        :root { --bg-color: #F5F2EB; --line-color: #1A1A1A; --accent-rust: #D35436; }
        body { background: var(--bg-color); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo-wrapper { width: 150px; height: 150px; margin-bottom: 20px; }
        .btn-start { background: var(--line-color); color: white; padding: 15px 40px; border: none; cursor: pointer; font-size: 1rem; border-radius: 4px; box-shadow: 4px 4px 0px var(--accent-rust); }
    </style>
</head>
<body>
    <div class="logo-wrapper">
        <!-- (Logo SVG wahi purana use kar sakte ho) -->
        <svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="45" fill="#D35436" /></svg>
    </div>
    <h1>swapsheep</h1>
    <button class="btn-start" onclick="location.href='dashboard.html'">Get Started</button>
</body>
</html>
