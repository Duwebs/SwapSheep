<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swapsheep</title>
    <style>
        :root { 
            --bg-color: #F5F2EB; 
            --line-color: #1A1A1A; 
            --accent-rust: #D35436; 
            --text-muted: #7A756B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body { 
            background: var(--bg-color); 
            min-height: 100vh; 
            min-height: -webkit-fill-available; /* Mobile browsers ke bottom bar issue ke liye */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow: hidden;

            /* Raw paper texture from your reference image */
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 0), 
                              radial-gradient(rgba(0,0,0,0.02) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
        }

        /* Centered content wrapper for stability across all device widths */
        .splash-card {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Fully responsive Logo wrapper */
        .logo-wrapper { 
            width: 35vw;
            max-width: 140px; 
            min-width: 100px;
            aspect-ratio: 1 / 1;
            margin-bottom: 24px; 
        }

        .sheep-logo {
            width: 100%;
            height: 100%;
        }

        .rust-sun {
            fill: var(--accent-rust);
        }

        .sheep-lines, .arrow-path, .arrow-head {
            stroke: var(--line-color);
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .sheep-lines { stroke-width: 3.5; }
        .arrow-path, .arrow-head { stroke-width: 2.5; }

        /* Endless loop rotation matching branding */
        .rotating-loop {
            transform-origin: 100px 100px;
            animation: spinLoop 10s linear infinite;
        }

        @keyframes spinLoop {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Scalable Typo using clamp() for perfect size on screen sizes */
        .brand-title {
            font-size: clamp(2rem, 8vw, 2.6rem);
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--line-color);
            margin-bottom: 6px;
        }

        .brand-subtitle {
            font-size: clamp(0.8rem, 3.5vw, 0.95rem);
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* Tactile Minimalist Button with scale animation on click */
        .btn-start { 
            width: 85%;
            max-width: 280px;
            background: var(--line-color); 
            color: white; 
            padding: 16px 32px; 
            border: 1.5px solid var(--line-color); 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 4px; 
            box-shadow: 4px 4px 0px var(--accent-rust); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent; /* Mobile tap blue shadow remover */
        }

        /* Desktop hovers and Mobile touch feedback */
        .btn-start:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--accent-rust);
        }

        .btn-start:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--accent-rust);
        }
    </style>
</head>
<body>

    <div class="splash-card">
        <!-- Upgraded: Minimalist Integrated Animated Sheep Logo -->
        <div class="logo-wrapper">
            <svg class="sheep-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <g class="rotating-loop">
                    <path class="arrow-path" d="M 100,25 A 75,75 0 0,1 170,120" />
                    <path class="arrow-path" d="M 100,175 A 75,75 0 0,1 30,80" />
                    <path class="arrow-head" d="M 165,105 L 170,120 L 155,123" />
                    <path class="arrow-head" d="M 35,95 L 30,80 L 45,77" />
                </g>
                <circle cx="100" cy="100" r="45" class="rust-sun" />
                <path class="sheep-lines" d="M 80,90 C 80,75 120,75 120,90 C 120,105 95,105 95,115" />
                <path class="sheep-lines" d="M 95,115 L 110,125 L 120,115" />
            </svg>
        </div>

        <h1 class="brand-title">swapsheep</h1>
        <p class="brand-subtitle">effortless, clean file swapping</p>
        
        <button class="btn-start" onclick="location.href='dashboard.html'">GET STARTED</button>
    </div>

</body>
</html>
